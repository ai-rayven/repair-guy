<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Repair Guy</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            // steel blue — primary "workshop" blue
            brand: {
              50:'#eff5fb',100:'#dbe8f4',200:'#bcd3e9',300:'#90b6d9',400:'#5e93c2',
              500:'#3d79ad',600:'#2f6090',700:'#284f76',800:'#244362',900:'#223a53'
            },
            // amber — gear / accent pop
            accent: { 400:'#fbbf24',500:'#f59e0b',600:'#d97706' },
            // deep navy — outlines & headings
            navy: '#1e3553'
          },
          boxShadow: { panel: '0 1px 3px rgba(30,53,83,.06), 0 12px 32px rgba(30,53,83,.08)' }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    [x-cloak]{display:none!important}
    html,body{height:100%}
    body{background:linear-gradient(180deg,#eef3f9 0%,#dfe9f3 100%)}
    .scroll-thin::-webkit-scrollbar{width:8px}
    .scroll-thin::-webkit-scrollbar-thumb{background:#b6cbe1;border-radius:9999px}
    .scroll-thin::-webkit-scrollbar-track{background:transparent}

    /* assistant markdown */
    .prose-chat{font-size:.925rem;line-height:1.6;color:#26384f}
    .prose-chat p{margin:.35rem 0}
    .prose-chat ol{margin:.35rem 0;padding-left:1.15rem;list-style:decimal}
    .prose-chat ul{margin:.35rem 0;padding-left:1.15rem;list-style:disc}
    .prose-chat li{margin:.15rem 0}
    .prose-chat strong{font-weight:600;color:#1e3553}
    .prose-chat code{background:#dbe8f4;padding:.05rem .3rem;border-radius:.3rem;font-size:.85em}
    .prose-chat .meta{display:inline-block;margin-top:.5rem;font-size:.72rem;color:#7d93ad}

    /* wrench "tightening a bolt" wiggle for the loading indicator */
    @keyframes wrench-turn{0%,100%{transform:rotate(-24deg)}50%{transform:rotate(20deg)}}
    .animate-wrench{animation:wrench-turn 1s ease-in-out infinite;transform-origin:50% 50%}

    iframe{border:0}

    /* subtle blueprint cross-hatch behind the chat (scrolls with the messages) */
    .chat-grid{
      background-color:#fff;
      background-image:
        linear-gradient(to right, rgba(61,121,173,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(61,121,173,.06) 1px, transparent 1px);
      background-size:22px 22px;
      background-attachment:local;
    }
  </style>
</head>

<body class="h-full text-slate-800 antialiased">
<div x-data="repairGuy()" x-init="init()" x-cloak class="h-full flex flex-col max-w-[1700px] mx-auto px-4 sm:px-6">

  <!-- Header -->
  <header class="flex items-center justify-between py-4">
    <div class="flex items-center gap-3">
      <img src="/media/repair_guy_logo_sm.png" alt="Repair Guy" class="w-16 h-16 object-contain shrink-0" />
      <div>
        <h1 class="text-lg font-bold tracking-tight text-navy leading-none">Repair Guy</h1>
        <p class="text-[13px] text-brand-700/70 mt-0.5">Offline AI repair manual assistant</p>
      </div>
    </div>
    <button @click="settingsOpen=true" aria-label="Settings" title="Settings"
      class="grid place-items-center w-10 h-10 rounded-full text-brand-500 hover:text-navy hover:bg-brand-100 transition">
      <i data-lucide="settings" class="w-5 h-5"></i>
    </button>
  </header>

  <!-- Main two-panel layout -->
  <main class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-2 gap-5 pb-5">

    <!-- LEFT: chat -->
    <section class="min-h-0 flex flex-col bg-white rounded-2xl shadow-panel ring-1 ring-navy/10 overflow-hidden">
      <!-- manual picker -->
      <div class="px-4 pt-4 pb-3 border-b border-brand-100">
        <label class="block text-[11px] font-semibold uppercase tracking-wide text-brand-500/80 mb-1.5">Manual</label>
        <div class="relative">
          <select x-model="manual" @change="newChat()"
            class="w-full appearance-none rounded-xl border border-brand-200 bg-brand-50/50 px-3.5 py-2.5 pr-9 text-sm font-medium text-navy focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition">
            <option value="">Select a manual…</option>
            <template x-for="m in manuals" :key="m.value">
              <option :value="m.value" x-text="m.label"></option>
            </template>
          </select>
          <i data-lucide="chevron-down" class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-400"></i>
        </div>
      </div>

      <!-- messages -->
      <div x-ref="chat" class="chat-grid flex-1 min-h-0 overflow-y-auto scroll-thin px-4 py-5 space-y-4">
        <!-- empty state -->
        <div x-show="messages.length===0" class="h-full grid place-items-center text-center px-6">
          <div>
            <i data-lucide="wrench" class="inline-block w-11 h-11 text-brand-300 mb-3"></i>
            <p class="font-semibold text-navy">Ask about a repair manual</p>
            <p class="text-sm text-brand-500/80 mt-1 max-w-xs mx-auto">Pick a manual above, then describe the issue or ask a question — answers come with the exact pages they're grounded in.</p>
          </div>
        </div>

        <template x-for="(m,i) in messages" :key="i">
          <div>
            <!-- tool-call chip -->
            <template x-if="m.role==='tool'">
              <div class="flex justify-start">
                <div class="flex items-center gap-2 rounded-full bg-white ring-1 ring-brand-200 pl-2.5 pr-3.5 py-1.5 text-[12px] text-brand-600 shadow-sm">
                  <i :data-lucide="m.icon" class="w-3.5 h-3.5 text-accent-600 shrink-0"></i>
                  <span class="font-medium" x-text="m.label"></span>
                  <span class="text-brand-400" x-show="m.detail" x-text="m.detail"></span>
                </div>
              </div>
            </template>
            <!-- chat bubble -->
            <template x-if="m.role!=='tool'">
              <div :class="m.role==='user' ? 'flex justify-end' : 'flex justify-start'">
                <div :class="m.role==='user'
                      ? 'max-w-[82%] rounded-2xl rounded-br-md bg-brand-600 text-white px-4 py-2.5 text-[.925rem] leading-relaxed shadow-sm ring-1 ring-navy/20'
                      : 'max-w-[88%] rounded-2xl rounded-bl-md bg-brand-50 ring-1 ring-brand-200 px-4 py-3 shadow-sm'">
                  <div x-show="m.role!=='user'" class="prose-chat" x-html="m.html"></div>
                  <span x-show="m.role==='user'" x-text="m.text"></span>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- thinking / live status -->
        <div x-show="loading" class="flex justify-start">
          <div class="rounded-2xl rounded-bl-md bg-brand-50 ring-1 ring-brand-200 px-4 py-3 flex items-center gap-2">
            <i data-lucide="wrench" class="w-4 h-4 animate-wrench text-brand-500"></i>
            <span class="text-sm text-brand-600" x-text="status || 'Thinking…'"></span>
          </div>
        </div>
      </div>

      <!-- input -->
      <div class="border-t border-brand-100 p-3">
        <div class="flex items-end gap-2 rounded-2xl border border-brand-200 bg-white focus-within:border-brand-400 focus-within:ring-2 focus-within:ring-brand-100 transition px-2.5 py-2">
          <textarea x-model="input" @keydown.enter.prevent="send()" rows="1"
            :disabled="!ready"
            placeholder="Describe the issue you're facing…"
            class="flex-1 resize-none bg-transparent px-1.5 py-1.5 text-sm text-navy outline-none placeholder:text-brand-400/70 max-h-32"></textarea>
          <button @click="send()" :disabled="loading || !ready || !input.trim()" aria-label="Send"
            class="shrink-0 grid place-items-center w-9 h-9 rounded-xl bg-brand-600 text-white hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed transition">
            <i data-lucide="arrow-up" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </section>

    <!-- RIGHT: PDF + cited pages -->
    <section class="min-h-0 flex flex-col bg-white rounded-2xl shadow-panel ring-1 ring-navy/10 overflow-hidden">
      <div class="flex-1 min-h-0 relative bg-brand-50/40">
        <!-- keyed on the full URL: PDF viewers only honor the #page fragment at
             load time and ignore hash-only src changes, so the iframe must be
             recreated to jump pages (same-origin reload, served from cache) -->
        <template x-for="u in (pdfDocId ? [pdfUrl] : [])" :key="u">
          <iframe :src="u" class="absolute inset-0 w-full h-full"></iframe>
        </template>
        <div x-show="!pdfDocId" class="chat-grid absolute inset-0 grid place-items-center text-center px-8">
          <div>
            <i data-lucide="file-text" class="inline-block w-11 h-11 text-brand-300 mb-3"></i>
            <p class="text-brand-500/80 text-sm max-w-xs">The cited manual page will appear here once you ask a question.</p>
          </div>
        </div>
      </div>

      <!-- cited pages strip -->
      <template x-if="thumbs.length">
        <div class="border-t border-brand-100 px-4 py-3">
          <p class="text-[11px] font-semibold uppercase tracking-wide text-brand-500/80 mb-2">Cited pages</p>
          <div class="flex gap-2.5 overflow-x-auto scroll-thin px-0.5 py-1">
            <template x-for="t in thumbs" :key="t.page">
              <button @click="pdfPage=t.page" type="button"
                :class="pdfPage===t.page ? 'border-accent-500' : 'border-brand-100 hover:border-brand-300'"
                class="shrink-0 rounded-lg overflow-hidden bg-white border-2 transition relative focus:outline-none">
                <img :src="t.src" class="h-28 w-auto block" :alt="'page '+t.page">
                <span class="absolute bottom-0 inset-x-0 bg-navy/80 text-white text-[10px] font-medium text-center py-0.5" x-text="'p.'+t.page"></span>
              </button>
            </template>
          </div>
        </div>
      </template>
    </section>
  </main>

  <!-- Settings modal -->
  <div x-show="settingsOpen" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center p-4"
       x-transition.opacity>
    <div class="absolute inset-0 bg-navy/50" @click="settingsOpen=false"></div>
    <div class="relative w-full max-w-md rounded-2xl bg-white shadow-2xl ring-1 ring-navy/10 p-6"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-2 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-bold text-navy">Settings</h2>
        <button @click="settingsOpen=false" aria-label="Close" class="grid place-items-center w-8 h-8 rounded-lg text-brand-400 hover:bg-brand-100 hover:text-navy transition">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- approach -->
      <label class="block text-xs font-semibold uppercase tracking-wide text-brand-500/80 mb-2">Retrieval approach</label>
      <div class="grid grid-cols-2 gap-2 mb-1">
        <template x-for="info in approaches" :key="info.key">
          <button @click="approach=info.key"
            :class="approach===info.key ? 'border-brand-500 bg-brand-50 ring-1 ring-brand-200' : 'border-brand-100 hover:border-brand-300'"
            class="text-left rounded-xl border px-3.5 py-3 transition">
            <div class="font-semibold text-sm text-navy" x-text="info.label"></div>
            <div class="text-[11px] text-brand-500/80 mt-0.5 leading-snug" x-text="info.blurb"></div>
          </button>
        </template>
      </div>

      <!-- k -->
      <div class="mt-5">
        <div class="flex items-center justify-between mb-1.5">
          <label class="text-xs font-semibold uppercase tracking-wide text-brand-500/80">Pages retrieved (k)</label>
          <span class="text-sm font-bold text-accent-600" x-text="k"></span>
        </div>
        <input type="range" min="1" :max="maxK" step="1" x-model.number="k"
               class="w-full accent-brand-600">
      </div>

      <div class="flex gap-2 mt-6">
        <button @click="refresh()" class="flex-1 rounded-xl border border-brand-200 px-4 py-2.5 text-sm font-medium text-navy hover:bg-brand-50 transition flex items-center justify-center gap-1.5">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          Sync library
        </button>
        <button @click="settingsOpen=false" class="flex-1 rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 transition">Done</button>
      </div>
    </div>
  </div>
</div>

<script>
function repairGuy() {
  return {
    client:null, ready:false,
    manuals:[], manual:'',
    approaches: __APPROACHES__,
    approach:'visual', k:__DEFAULT_K__, maxK:__MAX_K__,
    messages:[], history:[], input:'', loading:false, status:'',
    settingsOpen:false,
    pdfDocId:'', pdfPage:1, thumbs:[], turnFirstSearch:true,

    get pdfUrl(){ return this.pdfDocId ? `/pdf/${encodeURIComponent(this.pdfDocId)}#page=${this.pdfPage}&view=FitH&zoom=page-width` : ''; },

    md(t){ return DOMPurify.sanitize(marked.parse(t||'')); },

    async init(){
      window.lucide?.createIcons();  // swap <i data-lucide> -> clean SVG icons
      try{
        const mod = await import('https://cdn.jsdelivr.net/npm/@gradio/client/+esm');
        const Client = mod.Client || mod.client;
        this.client = Client.connect ? await Client.connect(location.origin) : await Client(location.origin);
        this.ready = true;
        await this.loadManuals();
      }catch(e){ console.error('connect failed', e); }
    },

    async loadManuals(){
      try{ const r = await this.client.predict('/manuals', {}); this.manuals = r.data?.[0] || []; }
      catch(e){ console.error(e); }
    },
    async refresh(){
      try{ const r = await this.client.predict('/refresh', {}); this.manuals = r.data?.[0] || []; }
      catch(e){ console.error(e); }
    },

    // re-run lucide for chips appended after the initial createIcons pass
    scroll(){ this.$nextTick(()=>{ window.lucide?.createIcons(); const el=this.$refs.chat; if(el) el.scrollTop = el.scrollHeight; }); },

    // switching manuals starts a fresh conversation — the history is about
    // the previous manual's pages
    newChat(){ this.messages=[]; this.history=[]; this.thumbs=[]; this.pdfDocId=''; this.pdfPage=1; },

    async send(){
      const q = this.input.trim();
      if(!q || this.loading || !this.ready) return;
      this.messages.push({role:'user', text:q});
      this.input=''; this.scroll();
      if(!this.manual){ this.messages.push({role:'assistant', html:this.md('Pick a manual first ☝️')}); this.scroll(); return; }
      this.loading=true; this.status='Thinking…'; this.turnFirstSearch=true; this.scroll();
      try{
        const job = this.client.submit('/ask', {question:q, manual:this.manual, approach:this.approach, k:this.k, history:this.history});
        // the client re-delivers the generator's last yield in the completion
        // payload, so stop after the first terminal (answer/error) event
        let finished = false;
        for await (const msg of job){
          if(finished || msg.type!=='data' || !msg.data?.[0]) continue;
          finished = this.handleEvent(msg.data[0]);
          this.scroll();
        }
      }catch(e){ this.messages.push({role:'assistant', html:this.md('⚠️ '+e)}); }
      this.loading=false; this.status=''; this.scroll();
    },

    // a pending chip is one whose tool_result hasn't arrived; results upsert
    // so a coalesced/dropped tool_call event never loses the chip
    pendingChip(tool){ return [...this.messages].reverse().find(m=>m.role==='tool' && m.tool===tool && m.pending); },

    // returns true on a terminal event (answer or error)
    handleEvent(ev){
      if(ev.error){ this.messages.push({role:'assistant', html:this.md(ev.error)}); return true; }
      switch(ev.type){
        case 'status':
          this.status = ev.text || 'Working…';
          if(ev.kind==='summarizing')
            this.messages.push({role:'tool', tool:'summarize', icon:'archive', label:'Summarizing earlier conversation', detail:'', pending:false});
          break;

        case 'tool_call':
          if(ev.tool==='search_docs'){
            this.status='Searching the manual…';
            this.messages.push({role:'tool', tool:'search_docs', icon:'search', label:`Searching: “${ev.args?.query||''}”`, detail:'', pending:true});
          }else if(ev.tool==='show_page'){
            this.messages.push({role:'tool', tool:'show_page', icon:'file-text', label:`Showing page ${ev.args?.page}`, detail:'', pending:true});
          }
          break;

        case 'tool_result':
          if(ev.tool==='search_docs'){
            let chip = this.pendingChip('search_docs');
            if(!chip){ chip={role:'tool', tool:'search_docs', icon:'search', label:'Searched the manual', detail:'', pending:true}; this.messages.push(chip); }
            chip.detail = '→ ' + (ev.pages||[]).map(p=>'p.'+p).join(', ');
            chip.pending = false;
            if(this.turnFirstSearch){ this.thumbs=[]; this.turnFirstSearch=false; }
            const seen = new Set(this.thumbs.map(t=>t.page));
            for(const t of (ev.thumbnails||[])) if(!seen.has(t.page)) this.thumbs.push(t);
            this.pdfDocId = this.manual;
            if(ev.pages?.length) this.pdfPage = ev.pages[0];
            this.status='Reading the retrieved pages…';
          }else if(ev.tool==='show_page'){
            let chip = this.pendingChip('show_page');
            if(chip) chip.pending=false;
            else this.messages.push({role:'tool', tool:'show_page', icon:'file-text', label:`Showing page ${ev.page}`, detail:'', pending:false});
            this.pdfDocId = this.manual;
            if(ev.page>=1) this.pdfPage = ev.page;
            this.status='Thinking…';
          }
          break;

        case 'answer': {
          const meta = `\n\n<span class="meta">⏱ ${ev.elapsed}s · ${ev.approach} · k=${ev.k}</span>`;
          this.messages.push({role:'assistant', html:this.md(ev.answer + meta)});
          this.history = ev.history || this.history;
          return true;
        }
      }
      return false;
    },
  }
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
